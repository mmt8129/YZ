<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GroqBot - Görselli Sohbet</title>
    <style>
        :root {
            --bg: #ffffff;
            --chat-bg: #ffffff;
            --received-text: #111b21;
            --input-bg: #f5f5f5;
            --header-bg: #f8f9fa;
            --border: #e8e8e8;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: #e8e8e8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .app-container {
            width: 100%;
            max-width: 550px;
            height: 100vh;
            max-height: 850px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }
        @media (min-width: 551px) {
            .app-container {
                height: 92vh;
                border-radius: 10px;
                margin: 2vh 0;
            }
        }
        .header {
            background: var(--header-bg);
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            z-index: 10;
            flex-shrink: 0;
            min-height: 44px;
        }
        .header-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4285f4, #34a853, #fbbc05, #ea4335);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: white;
            flex-shrink: 0;
        }
        .header-info {
            flex: 1;
            min-width: 0;
        }
        .header-name {
            font-weight: 600;
            font-size: 14px;
            color: #111b21;
            line-height: 1.2;
        }
        .header-status {
            font-size: 11px;
            color: #667781;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .header-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #31a24c;
            flex-shrink: 0;
        }
        .header-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .btn-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s ease;
            color: #777;
        }
        .btn-icon:hover {
            background: rgba(0, 0, 0, 0.05);
            color: #333;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--chat-bg);
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 10px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroll-bottom-btn {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #555;
            transition: all 0.2s ease;
            opacity: 0;
            transform: translateY(8px) scale(0.9);
            pointer-events: none;
        }
        .scroll-bottom-btn.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .scroll-bottom-btn:active {
            transform: scale(0.92);
            background: #f0f0f0;
        }
        .message-wrapper {
            display: flex;
            width: 100%;
            animation: messageSlideIn 0.25s ease;
            position: relative;
            flex-shrink: 0;
        }
        .message-wrapper.sent {
            justify-content: flex-end;
        }
        .message-wrapper.received {
            justify-content: flex-start;
        }
        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-bubble.sent {
            background: #0d47a1;
            color: #fff;
            max-width: 78%;
            padding: 8px 13px;
            border-radius: 14px 4px 14px 14px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 18px;
            position: relative;
        }
        .message-bubble.received {
            background: transparent;
            color: var(--received-text);
            width: 100%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 18px;
            padding: 6px 0;
        }
        .message-bubble.received .ai-content {
            padding: 0;
            min-height: 20px;
            line-height: 1.5;
            color: #111b21;
        }
        .message-bubble.received .ai-content p {
            margin: 4px 0;
        }
        .message-bubble.received .ai-content strong {
            font-weight: 600;
        }
        .message-bubble.received .ai-content em {
            font-style: italic;
        }
        .message-bubble.received .ai-content ul,
        .message-bubble.received .ai-content ol {
            margin: 4px 0;
            padding-left: 18px;
        }
        .message-bubble.received .ai-content li {
            margin: 1px 0;
        }
        .message-bubble.received .ai-content code {
            background: #f1f3f4;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 13px;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        .message-bubble.received .ai-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin: 6px 0;
            font-size: 12px;
        }
        .message-bubble.received .ai-content pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }
        .message-bubble.received .ai-content a {
            color: #1a73e8;
            text-decoration: none;
            pointer-events: none;
            cursor: default;
        }
        .message-bubble.received .ai-content h1,
        .message-bubble.received .ai-content h2,
        .message-bubble.received .ai-content h3 {
            margin: 6px 0 3px;
            font-weight: 600;
            font-size: 15px;
        }
        .message-bubble.received .ai-content blockquote {
            border-left: 2px solid #4285f4;
            padding-left: 8px;
            color: #666;
            margin: 4px 0;
        }
        .images-gallery {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 2px 0 6px 0;
            margin-bottom: 4px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 8px;
        }
        .images-gallery::-webkit-scrollbar {
            display: none;
        }
        .images-gallery .gallery-item {
            flex: 0 0 auto;
            width: 120px;
            height: 120px;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        .images-gallery .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .reload-images-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid #0055e5;
            border-radius: 6px;
            background: linear-gradient(180deg, #fff 0%, #ece9d8 100%);
            color: #000;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            transition: 0.1s ease;
            margin-bottom: 4px;
        }
        .reload-images-btn:hover {
            filter: brightness(1.03);
        }
        .copy-btn {
            position: absolute;
            bottom: -2px;
            right: 2px;
            width: 24px;
            height: 24px;
            border-radius: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            transition: all 0.15s ease;
            opacity: 0;
            z-index: 2;
        }
        .message-wrapper:hover .copy-btn,
        .message-wrapper:active .copy-btn {
            opacity: 1;
        }
        .copy-btn:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #555;
        }
        .copy-btn.copied {
            color: #34a853;
            font-weight: bold;
        }
        .message-wrapper.sent .copy-btn {
            color: rgba(255, 255, 255, 0.7);
            right: 4px;
            bottom: 0px;
        }
        .message-wrapper.received .copy-btn {
            right: -2px;
            bottom: -2px;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #bbb;
            animation: typingBounce 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typingBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
        .input-area {
            background: var(--input-bg);
            padding: 6px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }
        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        .input-wrapper textarea {
            width: 100%;
            padding: 9px 12px;
            border-radius: 18px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
            background: #fff;
            font-family: var(--font);
            transition: 0.15s ease;
            color: #111b21;
            resize: none;
            overflow-y: auto;
            min-height: 36px;
            max-height: 130px;
            line-height: 1.35;
            -webkit-overflow-scrolling: touch;
        }
        .input-wrapper textarea:focus {
            border-color: #4285f4;
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.1);
        }
        .input-wrapper textarea::placeholder {
            color: #999;
        }
        .input-wrapper textarea:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }
        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: #4285f4;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s ease;
            margin-bottom: 1px;
        }
        .send-btn:hover {
            background: #3367d6;
        }
        .send-btn:active {
            transform: scale(0.93);
            background: #2a56c6;
        }
        .send-btn:disabled {
            background: #b0c4de;
            cursor: not-allowed;
            transform: none;
        }
        .timer-bar {
            text-align: center;
            font-size: 11px;
            color: #999;
            padding: 0 10px 2px;
            min-height: 16px;
            transition: opacity 0.3s ease;
        }
        .xp-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.12s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .xp-dialog {
            background: #fff;
            border: 2px solid #0055e5;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.4);
            width: 300px;
            max-width: 90vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 12px;
        }
        .xp-titlebar {
            background: linear-gradient(180deg, #0058ee 0%, #3a8cf5 8%, #0055e5 40%, #0044cc 100%);
            color: #fff;
            padding: 5px 7px;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .xp-body {
            padding: 16px 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 12px;
            color: #000;
            line-height: 1.4;
        }
        .xp-body .xp-warn-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        .xp-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            padding: 8px 12px;
            background: #ece9d8;
            border-top: 1px solid #d4d0c8;
        }
        .xp-btn {
            padding: 4px 16px;
            border: 1px solid #003c74;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-weight: 500;
            min-width: 60px;
            transition: all 0.08s ease;
            outline: none;
        }
        .xp-btn:active {
            transform: translateY(1px);
        }
        .xp-btn.ok {
            background: linear-gradient(180deg, #fff 0%, #ece9d8 100%);
            color: #000;
            border-color: #0055e5;
            box-shadow: 0 0 0 1px #0055e5;
            font-weight: 600;
        }
        .xp-btn.cancel {
            background: linear-gradient(180deg, #fff 0%, #ece9d8 100%);
            color: #000;
            border-color: #999;
        }
        .xp-btn:hover {
            filter: brightness(1.03);
        }
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.15s ease;
        }
        .lightbox-header {
            background: linear-gradient(180deg, #0058ee 0%, #3a8cf5 8%, #0055e5 40%, #0044cc 100%);
            color: #fff;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            height: 32px;
            flex-shrink: 0;
            z-index: 10;
        }
        .lightbox-close-btn,
        .lightbox-save-btn {
            width: 26px;
            height: 26px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            transition: 0.1s ease;
        }
        .lightbox-close-btn:hover {
            background: rgba(255, 100, 100, 0.7);
            border-color: #fff;
        }
        .lightbox-save-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
        }
        .lightbox-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }
        .lightbox-main img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.05s ease;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }
        .lightbox-main img:active {
            cursor: grabbing;
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: 0.15s ease;
        }
        .lightbox-nav:hover {
            background: rgba(0, 0, 0, 0.6);
        }
        .lightbox-nav.prev {
            left: 10px;
        }
        .lightbox-nav.next {
            right: 10px;
        }
        .lightbox-thumbs {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            overflow-x: auto;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        .lightbox-thumbs::-webkit-scrollbar {
            height: 3px;
        }
        .lightbox-thumbs::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
        .lightbox-thumbs .thumb {
            flex: 0 0 auto;
            width: 48px;
            height: 48px;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.15s ease;
            border: 2px solid transparent;
            flex-shrink: 0;
        }
        .lightbox-thumbs .thumb.active {
            opacity: 1;
            border-color: #0055e5;
        }
        .lightbox-thumbs .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (max-width: 400px) {
            .chat-container {
                padding: 6px 10px;
                gap: 3px;
            }
            .message-bubble.sent {
                max-width: 85%;
                font-size: 13px;
            }
            .message-bubble.received {
                font-size: 13px;
            }
            .header {
                padding: 5px 10px;
                min-height: 38px;
            }
            .header-avatar {
                width: 26px;
                height: 26px;
                font-size: 13px;
            }
            .header-name {
                font-size: 13px;
            }
            .input-wrapper textarea {
                font-size: 13px;
                padding: 8px 10px;
            }
            .send-btn {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .images-gallery .gallery-item {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <div class="header-name">GroqBot</div>
                <div class="header-status"><span class="dot"></span> AKTİF</div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="clearBtn" title="Sohbeti Temizle">🗑️</button>
            </div>
        </div>
        <div class="chat-container" id="chatContainer">
            <div style="text-align:center;color:#bbb;padding:40px 20px;font-size:13px;line-height:1.5;" id="placeholderMsg">

            <button class="scroll-bottom-btn" id="scrollBottomBtn" title="En alta in">⬇</button>
        </div>
        <div class="input-area">
            <div class="timer-bar" id="timerBar"></div>
            <div class="input-row">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Bir şey sor ..." rows="1" autocomplete="off"></textarea>
                </div>
                <button class="send-btn" id="sendBtn" title="Gönder">➤</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

                if (cooldownTimer) return;
                cooldownSeconds = COOLDOWN_DURATION;
                disableInput();
                updateTimerDisplay();
                timerBar.style.opacity = '1';
                cooldownTimer = setInterval(() => {
                    cooldownSeconds--;
                    updateTimerDisplay();
                    if (cooldownSeconds <= 0) {
                        clearInterval(cooldownTimer);
                        cooldownTimer = null;
                        enableInput();
                        timerBar.textContent = '';
                        timerBar.style.opacity = '0';
                    }
                }, 1000);
            }

            function disableInput() {
                userInput.disabled = true;
                sendBtn.disabled = true;
                userInput.placeholder = '⏳ Lütfen bekleyin...';
            }

            function enableInput() {
                if (cooldownTimer) return;
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = 'Bir şey sor ...';
            }

            function updateTimerDisplay() {
                timerBar.textContent = `⏳ ${cooldownSeconds} saniye sonra tekrar sorabilirsin`;
            }

            function hasImageKeyword(text) {
                const lower = text.toLowerCase();
                return IMAGE_KEYWORDS.some(kw => lower.includes(kw));
            }

            function getImgCache() {
                try { return JSON.parse(localStorage.getItem(IMG_CACHE_KEY) || '{}'); } catch (e) { return {}; }
            }

            function saveImgCache(cache) {
                try { localStorage.setItem(IMG_CACHE_KEY, JSON.stringify(cache)); } catch (e) {}
            }

            function isMsgCached(msgId) {
                const cache = getImgCache();
                return !!cache[msgId];
            }

            function cacheMsgImages(msgId, urls) {
                const cache = getImgCache();
                cache[msgId] = urls;
                saveImgCache(cache);
            }

            function getCachedImages(msgId) {
                const cache = getImgCache();
                return cache[msgId] || [];
            }

 async function initFirebaseChat() {

                    console.warn('Firebase kayıt hatası:', e);

            async function loadFirebaseMessages() {
                if (!chatId) return;
                try {
                    const snap = await db.ref('chats/' + chatId + '/messages').once('value');
                    const data = snap.val();
                    if (data && Array.isArray(data) && data.length > 0) {
                        chatContainer.querySelectorAll('.message-wrapper').forEach(w => w.remove());
                        const ph = document.getElementById('placeholderMsg');
                        if (ph) ph.remove();
                        data.forEach(msg => {
                            if (msg.type === 'sent') appendSentMessage(msg.textContent, false);
                            else appendReceivedFromStorage(msg);
                        });
                        scrollToBottom(false);
                    }
                } catch (e) {
                    console.warn('Firebase yükleme hatası:', e);

            function collectMessages() {
                const messages = [];
                chatContainer.querySelectorAll('.message-wrapper').forEach(w => {
                    const bubble = w.querySelector('.message-bubble');
                    if (!bubble) return;
                    const type = w.classList.contains('sent') ? 'sent' : 'received';
                    const msgId = w.dataset.msgId || '';
                    const msgData = { type, textContent: '', imageUrls: [], msgId };
                    if (type === 'sent') {
                        msgData.textContent = bubble.textContent.replace(/📋/g, '').trim();
                    } else {
                        const aiContent = bubble.querySelector('.ai-content');
                        if (aiContent) msgData.textContent = aiContent.innerHTML;
                        const imgs = bubble.querySelectorAll('.gallery-item img');
                        imgs.forEach(img => msgData.imageUrls.push(img.src));
                    }
                    messages.push(msgData);
                });
                return messages;
            }

            function appendReceivedFromStorage(msgData) {
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper received';
                wrapper.dataset.msgId = msgData.msgId || '';
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble received';

                if (msgData.imageUrls && msgData.imageUrls.length > 0) {
                    const msgId = msgData.msgId;
                    if (msgId && isMsgCached(msgId)) {
                        const cached = getCachedImages(msgId);
                        const gallery = createImagesGallery(cached);
                        bubble.appendChild(gallery);

                content.className = 'ai-content';

            function createReloadButton(imageUrls, msgId) {
                const btn = document.createElement('button');

                btn.addEventListener('click', (e) => {

            let lastTouchDistance = 0;
            let lastTouchX = 0;
            let lastTouchY = 0;

            function openLightbox(images, startIndex) {
                lightboxImages = images;
                lightboxIndex = startIndex;

                lightboxTranslateY = 0;
                const existing = document.querySelector('.lightbox-overlay');

                const main = document.createElement('div');
                main.className = 'lightbox-main';

                    main.appendChild(prevBtn);

                    main.appendChild(nextBtn);
                }
                main.appendChild(mainImg);
                const thumbs = document.createElement('div');
                thumbs.className = 'lightbox-thumbs';
                images.forEach((url, i) => {
                    const thumb = document.createElement('div');
                    thumb.className = 'thumb' + (i === startIndex ? ' active' : '');
                    const thumbImg = document.createElement('img');
                    thumbImg.src = url;
                    thumbImg.alt = 'Görsel ' + (i + 1);

                overlay.appendChild(header);

                overlay.addEventListener('keydown', (e) => {

            function downloadCurrentImage() {
                const mainImg = document.getElementById('lightboxMainImg');
                if (!mainImg || !mainImg.src) return;

            function closeLightbox() { const o = document.getElementById('lightboxOverlay'); if (o) o.remove();
                lightboxImages = [];
                lightboxIndex = 0;
                lightboxScale = 1;
                lightboxTranslateX = 0;
                lightboxTranslateY = 0; }

            function navigateLightbox(d) { const n = lightboxIndex + d; if (n >= 0 && n < lightboxImages.length) {
                    lightboxIndex = n;
                    updateLightboxImage();
                    updateThumbs(); } }

            function updateLightboxImage() { const m = document.getElementById('lightboxMainImg'); if (m) { m.src =
                        lightboxImages[lightboxIndex];
                    resetZoom(); } }

            function updateThumbs() { document.querySelectorAll('.lightbox-thumbs .thumb').forEach((t, i) => { t
                    .classList.toggle('active', i === lightboxIndex); }); }

            function resetZoom() { lightboxScale = 1;
                lightboxTranslateX = 0;
                lightboxTranslateY = 0; const m = document.getElementById('lightboxMainImg'); if (m) m.style.transform =
                    'scale(1)';
                lastTouchDistance = 0; }

            function setupLightboxTouch(img) {
                img.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 2) { e.preventDefault(); const dx = e.touches[0].clientX - e.touches[
                                1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY;
                        lastTouchDistance = Math.sqrt(dx * dx + dy * dy);
                        lastTouchX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        lastTouchY = (e.touches[0].clientY + e.touches[1].clientY) / 2; } else if (e.touches
                        .length === 1) { lastTouchX = e.touches[0].clientX;
                        lastTouchY = e.touches[0].clientY;
                        isDragging = true; }
                }, { passive: false });
                img.addEventListener('touchmove', (e) => {
                    if (e.touches.length === 2) { e.preventDefault(); const dx = e.touches[0].clientX - e.touches[
                                1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY; const cd = Math
                            .sqrt(dx * dx + dy * dy); if (lastTouchDistance > 0) { let ns = (cd /
                                lastTouchDistance) * lightboxScale;
                            ns = Math.max(0.5, Math.min(4, ns));
                            img.style.transform = `scale(${ns})`;
                            img.style.transition = 'none'; } } else if (e.touches.length === 1 && isDragging &&
                        lightboxScale > 1) { e.preventDefault();
                        lightboxTranslateX += e.touches[0].clientX - lastTouchX;
                        lightboxTranslateY += e.touches[0].clientY - lastTouchY;
                        img.style.transform =
                            `translate(${lightboxTranslateX}px, ${lightboxTranslateY}px) scale(${lightboxScale})`;
                        lastTouchX = e.touches[0].clientX;
                        lastTouchY = e.touches[0].clientY; }
                }, { passive: false });
                img.addEventListener('touchend', () => { const t = img.style.transform; const sm = t.match(
                        /scale\(([^)]+)\)/); if (sm) lightboxScale = parseFloat(sm[1]); const tm = t.match(
                        /translate\(([^,]+)px,\s*([^)]+)px\)/); if (tm) { lightboxTranslateX = parseFloat(tm[
                            1]);
                        lightboxTranslateY = parseFloat(tm[2]); }
                    lastTouchDistance = 0;
                    isDragging = false;
                    img.style.transition = 'transform 0.2s ease'; });
            }

            // ==================== MARKDOWN ====================
            function markdownToHTML(md) { let h = md;
                h = h.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
                h = h.replace(/https?:\/\/\S+/g, '');
                h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                h = h.replace(/__(.+?)__/g, '<strong>$1</strong>');
                h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
                h = h.replace(/_(.+?)_/g, '<em>$1</em>');
                h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
                h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
                h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
                h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
                h = h.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
                h = h.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
                h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
                h = h.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
                h = h.replace(/\n\n/g, '<br><br>');
                h = h.replace(/\n/g, '<br>'); return h; }

            // ==================== TINYFISH API ====================
            async function callTinyFishSearch(query) { try { const targetUrl =
                        `https://api.search.tinyfish.ai?query=${encodeURIComponent(query)}&language=tr&max_results=5`; const res =
                    await fetch(`${PROXY_URL}?url=${encodeURIComponent(targetUrl)}`, { method: 'GET',
                        headers: { 'X-API-Key': TINYFISH_API_KEY } }); if (res.status === 429) { console.warn(
                        '⚠️ TinyFish kota aşımı');
                    startCooldown(); return { results: [], rateLimited: true }; } if (!res.ok) return { results: [] }; return await res
                    .json(); } catch (e) { return { results: [] }; } }
            async function callTinyFishFetch(url) { try { const targetUrl = `https://api.fetch.tinyfish.ai`; const res =
                    await fetch(`${PROXY_URL}?url=${encodeURIComponent(targetUrl)}`, { method: 'POST',
                        headers: { 'X-API-Key': TINYFISH_API_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ urls: [url], format: 'markdown' }) }); if (res.status === 429)
                    return ''; if (!res.ok) return ''; const data = await res.json(); return data.content || data
                    .markdown || data.text || ''; } catch (e) { return ''; } }
            async function getInternetContext(query) { const searchResult = await callTinyFishSearch(query); if (
                    searchResult.rateLimited) return { rateLimited: true }; if (!searchResult.results || searchResult
                    .results.length === 0) return ''; let context = 'GÜNCEL İNTERNET ARAMA SONUÇLARI:\n'; const
                    firstResult = searchResult.results[0]; if (firstResult.url) { const fullContent = await
                        callTinyFishFetch(firstResult.url); if (fullContent && fullContent.length > 100) { context +=
                            `\n📄 KAYNAK 1 (Tam İçerik):\n${fullContent.substring(0, 3000)}\n---\n`; } }
                searchResult.results.slice(1, 5).forEach((r, i) => { context +=
                        `📄 KAYNAK ${i + 2}: ${r.title || ''}\n${r.snippet || r.description || ''}\n---\n`; }); return context; }

            // ==================== TAVILY RESİM API ====================
            async function callTavilyImages(query) { try { const res = await fetch(
                    `${PROXY_URL}?url=https://api.tavily.com/search`, { method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: TAVILY_API_KEY, query: query, search_depth: "basic",
                        max_results: 5, include_images: true }) }); if (!res.ok) return []; const data = await res
                    .json(); return data.images || []; } catch (e) { return []; } }
            function getImageSearchQuery(currentQuery) { if (hasImageKeyword(currentQuery)) { const lower = currentQuery
                    .toLowerCase().trim(); const isShortQuery = lower.length < 20 && IMAGE_KEYWORDS.some(kw => lower
                        .includes(kw)); if (isShortQuery) { const hist = JSON.parse(localStorage.getItem(
                            HISTORY_KEY) || '[]'); const userMessages = hist.filter(m => m.role === 'user'); if (
                            userMessages.length > 0) { const lastUserMsg = userMessages[userMessages.length - 1]
                            .text;
                        let clean = lastUserMsg;
                        IMAGE_KEYWORDS.forEach(kw => { const escapedKw = kw.replace(/[.*+?^${}()|[\]\\]/g,
                                '\\$&');
                            clean = clean.replace(new RegExp(escapedKw, 'gi'), '').trim(); }); return clean ||
                            lastUserMsg; } } return currentQuery; } return null; }

            // ==================== GROQ API ====================
            async function callGroq(userQuery, context) { const tarih = new Date().toLocaleString('tr-TR', { day: 'numeric',
                    month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', weekday: 'long' }); let prompt =
                    userQuery; if (context) { prompt =
                        `SORU: ${userQuery}\n\n${context}\n\nEğer yukarıdaki internet sonuçları soruyla alakalı güncel bilgiler içeriyorsa onları kullan. Eğer internet sonuçları soruyla alakasızsa veya soru günlük sohbet (selamlaşma, hal hatır sorma, kişisel sohbet) içeriyorsa, internet sonuçlarından hiç bahsetme, direkt soruyu yanıtla.`; } const
                    history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); const recent = history.slice(-5); const
                    res = await fetch(`${PROXY_URL}?url=https://api.groq.com/openai/v1/chat/completions`, { method: 'POST',
                        headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: "llama-3.3-70b-versatile",
                            messages: [{ role: "system",
                                content: `Sen bir arkadaşsın. Bugün: ${tarih}. Sadece TÜRKÇE konuş. Her cevaba ABİ diyerek başla. Emojiler kullan. Cevaplarını düzenli ver: önce kısa başlık, sonra maddeler. Önemli yerleri **kalın** yap. Sayısal verileri ve isimleri **kalın** yaz.` },
                                ...recent.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant',
                                    content: m.text })), { role: "user", content: prompt }
                            ], temperature: 0.3, max_tokens: 1024 }) }); if (!res.ok) throw new Error(
                        `Groq API (${res.status})`); const data = await res.json(); if (!data.choices?.[0]?.message)
                    throw new Error('Groq boş yanıt'); return data.choices[0].message.content; }
            function cleanText(t) { let c = t.replace(/␃🔚␗/g, '').replace(/\{[\s\S]*?\}/g, ''); const idx = c.search(
                    /[A-ZİĞÜŞÖÇ]/); if (idx !== -1) c = c.substring(idx); return c.replace(/[\s\}\]奉",:]{2,}$/g,
                ''); }

            // ==================== ANA İŞLEM ====================
            async function handleSend() {
                if (isProcessing || cooldownTimer) return;
                const query = userInput.value.trim();
                if (!query) return;
                if (query.toUpperCase() === 'CLS') {
                    showXPClearConfirm();
                    userInput.value = '';
                    resizeTextarea();
                    return;
                }
                isProcessing = true;
                sendBtn.disabled = true;
                userInput.disabled = true;
                userInput.value = '';
                resizeTextarea();
                appendSentMessage(query);
                appendTypingIndicator();
                try {
                    const imageQuery = getImageSearchQuery(query);
                    const promises = [getInternetContext(query)];
                    if (imageQuery) promises.push(callTavilyImages(imageQuery));
                    else promises.push(Promise.resolve(null));
                    const [ctx, imageUrls] = await Promise.all(promises);
                    if (ctx && ctx.rateLimited) {
                        removeTypingIndicator();
                        const w2 = document.createElement('div');
                        w2.className = 'message-wrapper received';
                        const b2 = document.createElement('div');
                        b2.className = 'message-bubble received';
                        const ec2 = document.createElement('div');
                        ec2.className = 'ai-content';
                        ec2.textContent = '⏳ Abi TinyFish kotası doldu, 12 saniye sonra tekrar dener misin?';
                        b2.appendChild(ec2);
                        addCopyButton(w2, b2, 'received');
                        w2.appendChild(b2);
                        chatContainer.appendChild(w2);
                        saveMessagesToFirebase();
                        isProcessing = false;
                        resizeTextarea();
                        updateScrollBtn();
                        return;
                    }
                    const reply = await callGroq(query, ctx);
                    removeTypingIndicator();
                    const final = cleanText(reply);
                    const finalText = final.toUpperCase().startsWith('ABİ') ? final : 'ABİ ' + final;
                    appendReceivedMessage(finalText, imageUrls && imageUrls.length > 0 ? imageUrls : null);
                    const hist = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                    hist.push({ role: 'user', text: query });
                    hist.push({ role: 'ai', text: finalText });
                    if (hist.length > 40) hist.splice(0, hist.length - 40);
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
                } catch (err) {
                    console.error('Hata:', err);
                    removeTypingIndicator();
                    const w3 = document.createElement('div');
                    w3.className = 'message-wrapper received';
                    const b3 = document.createElement('div');
                    b3.className = 'message-bubble received';
                    const ec3 = document.createElement('div');
                    ec3.className = 'ai-content';
                    ec3.textContent = '⚠️ Üzgünüm abi, hata: ' + (err.message || 'Bilinmeyen');
                    b3.appendChild(ec3);
                    addCopyButton(w3, b3, 'received');
                    w3.appendChild(b3);
                    chatContainer.appendChild(w3);
                    saveMessagesToFirebase();
                }
                isProcessing = false;
                resizeTextarea();
                updateScrollBtn();
                enableInput();
            }

            function resizeTextarea() { userInput.style.height = 'auto';
                userInput.style.height = Math.min(userInput.scrollHeight, 130) + 'px'; }

            // ==================== XP MODAL ====================
            function showXPClearConfirm() { const exist = document.querySelector('.xp-overlay'); if (exist) exist.remove(); const
                    overlay = document.createElement('div');
                overlay.className = 'xp-overlay'; const dialog = document.createElement('div');
                dialog.className = 'xp-dialog';
                dialog.innerHTML =
                    `<div class="xp-titlebar"><span>⚠️</span> Sohbeti Temizle</div><div class="xp-body"><span class="xp-warn-icon">⚠️</span><span>Tüm sohbet geçmişini silmek istediğine emin misin?<br>Bu işlem geri alınamaz.</span></div><div class="xp-buttons"><button class="xp-btn ok" id="xpOkBtn">Tamam</button><button class="xp-btn cancel" id="xpCancelBtn">İptal</button></div>`;
                overlay.appendChild(dialog);
                document.body.appendChild(overlay); const ok = dialog.querySelector('#xpOkBtn'); const cancel = dialog
                    .querySelector('#xpCancelBtn'); const close = () => overlay.remove();
                cancel.addEventListener('click', close);
                overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
                ok.addEventListener('click', () => { chatContainer.querySelectorAll('.message-wrapper').forEach(w => w
                        .remove());
                    localStorage.removeItem(HISTORY_KEY);
                    localStorage.removeItem(IMG_CACHE_KEY);
                    clearFirebaseChat().then(() => {
                        if (!chatContainer.querySelector('#placeholderMsg')) {
                            const ph = document.createElement('div');
                            ph.id = 'placeholderMsg';
                            ph.style.cssText =
                                'text-align:center;color:#bbb;padding:40px 20px;font-size:13px;line-height:1.5;';
                            ph.textContent = '👋 Selam abi!\nSorunu yaz, Groq cevaplasın.';
                            chatContainer.appendChild(ph);
                        }
                        scrollBottomBtn.classList.remove('visible');
                        close();
                        initFirebaseChat();
                    });
                });
                dialog.addEventListener('keydown', e => { if (e.key === 'Escape') close(); if (e.key === 'Enter') ok
                        .click(); });
                setTimeout(() => ok.focus(), 100); }

            // ==================== EVENTLER ====================
            sendBtn.addEventListener('click', handleSend);
            userInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
                    handleSend(); } });
            userInput.addEventListener('input', resizeTextarea);
            clearBtn.addEventListener('click', showXPClearConfirm);
            chatContainer.addEventListener('scroll', updateScrollBtn);
            scrollBottomBtn.addEventListener('click', () => { scrollToBottom(true);
                autoScrollActive = true;
                scrollBottomBtn.classList.remove('visible'); });
            window.addEventListener('resize', updateScrollBtn);

           async function init() {
    await initFirebaseChat();
    await loadFirebaseMessages();
    scrollToBottom(false);
    resizeTextarea();
    updateScrollBtn();
}
            init();
            console.log('🤖 GroqBot v11 - Firebase Sohbet + Akıllı Kota');
        })();
    </script>
</body>
</html>
